<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{title}}</title>
<meta name="description" content="{{description}}" />
<meta name="author" content="{{author}}" />
<link rel="icon" type="image/png" href="assets/img/favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="#top" class="nav-brand">
      <img src="assets/img/favicon.png" alt="" class="nav-logo" />
      <span>Qing Wu</span>
    </a>
    <div class="nav-links">
      <a href="#about">About</a>
      <a href="#news">News</a>
      <a href="#publications">Publications</a>
      <a href="#friends">Friends</a>
    </div>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
      <i class="fas fa-moon"></i>
    </button>
  </div>
</nav>

<main id="top">

  <section id="about" class="section hero">
    <div class="hero-grid">
      {{about}}
    </div>
  </section>

  <section id="news" class="section">
    <h2 class="section-title">News</h2>
    <div class="news-scroll">
      <ul class="news-list">
        {{news}}
      </ul>
    </div>
  </section>

  <section id="publications" class="section">
    <h2 class="section-title">Selected Publications</h2>
    <p class="section-sub">* indicates equal contribution. See the full list on my <a href="https://scholar.google.com/citations?user=A1E80HUAAAAJ" target="_blank" rel="noopener">Google Scholar</a>.</p>
    <div class="pub-list">
      {{publications}}
    </div>
  </section>

  <section id="friends" class="section">
    <h2 class="section-title">Friends</h2>
    <p class="section-sub">{{friends_sub}}</p>
    <ul class="friends-list">
      {{friends}}
    </ul>
  </section>

</main>

<footer class="site-footer">
  <p>© <span id="year"></span> Qing Wu · Built with plain HTML/CSS — hosted on GitHub Pages.</p>
</footer>

<script src="assets/js/main.js"></script>
</body>
</html>
